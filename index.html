<html lang="uk">
<head>

    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: #F0E6FF;
            display: flex; justify-content: center; height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100%; max-width: 450px;
            background-color: #FFFFFF; height: 100%;
            border: 2px solid #D8BFFF; display: flex; flex-direction: column;
            overflow: hidden; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); position: relative;
        }

        .hidden { display: none !important; }

        /* ЕКРАН АВТОРИЗАЦІЇ */
        .screen-auth { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 30px; background-color: #FBF7FF; box-sizing: border-box; overflow-y: auto; }
        .auth-logo { font-size: 26px; font-weight: bold; color: #5D418A; margin-bottom: 10px; text-align: center; }
        .auth-sub { font-size: 13px; color: #7D61AA; margin-bottom: 25px; text-align: center; }
        .input-group { margin-bottom: 15px; width: 100%; }
        .input-group label { display: block; font-size: 12px; color: #5D418A; margin-bottom: 5px; font-weight: bold; }
        .auth-input { width: 100%; padding: 12px; border: 2px solid #D8BFFF; border-radius: 12px; font-family: inherit; font-size: 14px; box-sizing: border-box; }
        .auth-btn-group { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 10px; }
        .auth-button { width: 100%; padding: 14px; background-color: #FFDAF0; border: 2px solid #D8BFFF; border-radius: 12px; color: #5D418A; font-family: inherit; font-size: 15px; font-weight: bold; cursor: pointer; box-shadow: 0px 4px 0px #D8BFFF; transition: all 0.1s; }
        .auth-button:active { transform: translateY(4px); box-shadow: none; }
        .auth-button.secondary { background-color: #F0E6FF; box-shadow: 0px 4px 0px #C3A6FF; border-color: #C3A6FF; }

        /* ГОЛОВНИЙ ЕКРАН */
        .screen-main { display: flex; flex-direction: column; height: 100%; }
        .profile-header { background-color: #FFDAF0; padding: 15px; display: flex; align-items: center; border-bottom: 2px solid #D8BFFF; }
        .profile-avatar { width: 50px; height: 50px; border-radius: 50%; border: 3px solid #D8BFFF; margin-right: 15px; background-color: #FFFFFF; font-size: 30px; display: flex; align-items: center; justify-content: center; }
        .profile-info { flex: 1; }
        .profile-info h1 { font-size: 18px; margin: 0; color: #5D418A; }
        .profile-info p { font-size: 11px; margin: 2px 0 0; color: #7D61AA; line-break: anywhere; }
        .edit-profile-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: #5D418A; }
        
        .search-container { padding: 10px; }
        .search-input { width: 100%; padding: 12px; border: 2px solid #D8BFFF; border-radius: 20px; background-color: #FBF7FF; font-size: 14px; box-sizing: border-box; font-family: inherit; }
        .chats-list { flex: 1; overflow-y: auto; padding: 10px; }

        /* КАРТКА ДРУГА */
        .chat-item { display: flex; align-items: center; padding: 12px; border: 2px solid #D8BFFF; border-radius: 15px; background-color: #FBF7FF; cursor: pointer; margin-bottom: 10px; position: relative; }
        .chat-avatar-container { position: relative; margin-right: 12px; }
        .chat-avatar { width: 45px; height: 45px; border-radius: 50%; background-color: #FFDAF0; font-size: 24px; display: flex; align-items: center; justify-content: center; border: 2px solid #D8BFFF; }
        .online-dot { width: 12px; height: 12px; background-color: #4CAF50; border: 2px solid white; border-radius: 50%; position: absolute; bottom: 0; right: 0; display: none; }
        .online-dot.active { display: block; }
        .chat-content { flex: 1; min-width: 0; }
        .chat-title { font-size: 14px; font-weight: bold; color: #5D418A; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-content .chat-friend-status { font-size: 10px; color: #9A80B3; font-style: italic; }
        .chat-message { font-size: 11px; color: #7D61AA; margin: 3px 0 0; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        
        .badge { background-color: #FF6B6B; color: white; border-radius: 50%; min-width: 18px; height: 18px; padding: 2px; font-size: 10px; font-weight: bold; position: absolute; right: 15px; top: calc(50% - 11px); display: flex; align-items: center; justify-content: center; box-sizing: border-box; }

        /* МОДАЛКА ПРОФІЛЮ */
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(93, 65, 138, 0.4); display: flex; align-items: center; justify-content: center; z-index: 200; }
        .modal-content { background: #FFFFFF; border: 3px solid #D8BFFF; border-radius: 20px; padding: 25px; width: 85%; box-sizing: border-box; }
        .avatar-selector { display: flex; justify-content: space-around; font-size: 30px; margin-bottom: 20px; }
        .avatar-option { cursor: pointer; padding: 5px; border-radius: 50%; border: 2px solid transparent; }
        .avatar-option.selected { border-color: #D8BFFF; background-color: #FFDAF0; }

        /* ВІКНО ЧАТУ */
        .screen-chat-window { display: flex; flex-direction: column; height: 100%; background-color: #F7F0FF; position: relative; overflow: hidden; }
        
        .chat-header { 
            position: absolute; top: 0; left: 0; right: 0; width: 100%; max-width: 450px; margin: 0 auto;
            background-color: #FFDAF0; padding: 12px 15px; 
            display: flex; align-items: center; border-bottom: 2px solid #D8BFFF; 
            box-sizing: border-box; z-index: 999;
        }
        .back-button { background: none; border: none; font-size: 20px; color: #5D418A; cursor: pointer; margin-right: 15px; font-weight: bold; padding: 5px; }
        .chat-header-avatar { width: 38px; height: 38px; border-radius: 50%; background: white; border: 2px solid #D8BFFF; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-right: 10px; }
        .chat-header-info { display: flex; flex-direction: column; min-width: 0; flex: 1; }
        .chat-header-title { font-size: 15px; font-weight: bold; color: #5D418A; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-header-status { font-size: 11px; color: #A080D0; font-style: italic; font-weight: bold; height: 14px; }

        /* ПАНЕЛЬ ЗАКРІПЛЕНОГО ПОВІДОМЛЕННЯ */
        .pinned-message-bar { 
            position: absolute; top: 64px; left: 0; right: 0; width: 100%; max-width: 450px; margin: 0 auto;
            background-color: #FFF0FA; padding: 8px 15px; border-bottom: 2px solid #E6C5FF; 
            display: flex; align-items: center; justify-content: space-between; 
            font-size: 12px; color: #5D418A; box-sizing: border-box; z-index: 998; 
        }
        .pinned-text { font-weight: bold; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; flex: 1; cursor: pointer; border-left: 3px solid #D8BFFF; padding-left: 8px; }
        .unpin-btn { background: none; border: none; font-size: 14px; cursor: pointer; color: #9A80B3; font-weight: bold; padding: 2px 6px; }
        
        /* КОНТЕЙНЕР ПОВІДОМЛЕНЬ */
        .messages-container { 
            flex: 1; overflow-y: auto; 
            padding: 120px 15px 15px 15px; 
            display: flex; flex-direction: column; gap: 14px; width: 100%; box-sizing: border-box; 
        }
        
        .msg-line-block { display: flex; width: 100%; position: relative; clear: both; box-sizing: border-box; }
        .msg-line-block.sent { justify-content: flex-end; }
        .msg-line-block.received { justify-content: flex-start; }

        .msg-bubble-box { display: flex; flex-direction: column; max-width: 75%; position: relative; }
        .msg-line-block.sent .msg-bubble-box { align-items: flex-end; }
        .msg-line-block.received .msg-bubble-box { align-items: flex-start; }

        .message { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; word-wrap: break-word; position: relative; box-sizing: border-box; width: fit-content; }
        .message.sent { background-color: #E2C6FF; color: #3D216A; border-bottom-right-radius: 2px; border: 1px solid #D8BFFF; text-align: left; }
        .message.received { background-color: #FFFFFF; color: #5D418A; border-bottom-left-radius: 2px; border: 1px solid #E6D5FF; text-align: left; }
        .message.sticker { background: none !important; border: none !important; font-size: 45px; padding: 0; }

        /* ПЛАШКА КНОПОК ДІЙ */
        .msg-hover-actions { 
            display: flex; gap: 8px; opacity: 0; transition: opacity 0.2s, transform 0.2s; 
            background: #FFFFFF; padding: 5px 10px; border-radius: 15px; 
            border: 2px solid #D8BFFF; box-shadow: 0 4px 12px rgba(93, 65, 138, 0.2); 
            position: absolute; top: -44px; z-index: 100; pointer-events: none;
            align-items: center; white-space: nowrap;
        }
        .msg-bubble-box:hover .msg-hover-actions, .msg-hover-actions.active { opacity: 1; pointer-events: auto; }
        .msg-line-block.sent .msg-hover-actions { right: 0; }
        .msg-line-block.received .msg-hover-actions { left: 0; }
        
        .msg-action-btn { font-size: 14px; color: #A080D0; cursor: pointer; background: none; border: none; padding: 2px 5px; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; }
        .msg-action-btn:hover { color: #5D418A; transform: scale(1.2); }
        
        .inline-reaction-picker { display: flex; gap: 6px; border-left: 2px dashed #D8BFFF; padding-left: 6px; margin-left: 2px; }
        .inline-emoji { cursor: pointer; transition: transform 0.1s; font-size: 14px; }
        .inline-emoji:hover { transform: scale(1.3); }

        .quote-in-message { background-color: rgba(0, 0, 0, 0.04); border-left: 3px solid #5D418A; padding: 4px 8px; font-size: 11px; color: #5D418A; border-radius: 4px; margin-bottom: 6px; font-style: italic; }

        /* РЕАКЦІЇ */
        .reactions-container { display: flex; gap: 3px; position: absolute; bottom: -10px; background: white; border: 1px solid #D8BFFF; padding: 1px 6px; border-radius: 10px; font-size: 11px; box-shadow: 0px 2px 4px rgba(0,0,0,0.05); z-index: 2; white-space: nowrap; }
        .msg-line-block.sent .reactions-container { right: 10px; }
        .msg-line-block.received .reactions-container { left: 10px; }

        .message-meta { font-size: 10px; color: #9A80B3; margin-top: 4px; width: 100%; display: flex; box-sizing: border-box; }
        .msg-line-block.sent .message-meta { justify-content: flex-end; padding-right: 4px; }
        .msg-line-block.received .message-meta { justify-content: flex-start; padding-left: 4px; }
        .status-ticks { font-weight: bold; color: #9A80B3; font-size: 11px; margin-left: 4px; }
        .status-ticks.read { color: #4CAF50; }

        /* ЗОНА ВВЕДЕННЯ ТА ПАНЕЛІ ЗНИЗУ */
        .bottom-controls-wrapper {
            display: flex; flex-direction: column;
            background-color: #FFFFFF; flex-shrink: 0; z-index: 130;
            border-top: 2px solid #D8BFFF; position: relative;
        }

        .reply-preview-bar { 
            background-color: #FFF3FA; padding: 8px 15px; border-bottom: 2px solid #D8BFFF; 
            display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #5D418A;
            width: 100%; box-sizing: border-box;
        }
        .reply-preview-text { font-style: italic; border-left: 3px solid #D8BFFF; padding-left: 8px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; flex: 1; }
        .cancel-reply-btn { background: none; border: none; font-size: 14px; cursor: pointer; color: #FF6B6B; font-weight: bold; padding: 5px; }

        .stickers-panel { display: flex; gap: 15px; background: #FFF3FA; padding: 8px 15px; border-bottom: 2px solid #D8BFFF; font-size: 24px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .sticker-btn { cursor: pointer; transition: transform 0.1s; display: inline-block; }
        .sticker-btn:hover { transform: scale(1.2); }

        .chat-input-area { padding: 10px; display: flex; gap: 10px; align-items: center; background-color: #FFFFFF; }
        .message-input { flex: 1; padding: 12px; border: 2px solid #D8BFFF; border-radius: 20px; font-family: inherit; font-size: 14px; outline: none; background-color: #FBF7FF; -webkit-appearance: none; }
        .send-button { width: 45px; height: 45px; border-radius: 50%; background-color: #FFDAF0; border: 2px solid #D8BFFF; color: #5D418A; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0px 2px 0px #D8BFFF; flex-shrink: 0; }
        
        .loading-screen { display: flex; width: 100%; height: 100%; background: #F0E6FF; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; color: #5D418A; position: absolute; top:0; left:0; z-index: 1000; }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- РЕЄСТРАЦІЯ ТА ВХІД -->

        <!-- СПИСОК ЧАТІВ -->

        <!-- МОДАЛКА ПРОФІЛЮ -->
        <div id="profileModal" class="modal-overlay hidden">
            <div class="modal-content">
                <div class="modal-title" style="font-weight: bold; margin-bottom: 15px; color: #5D418A;">Твій чарівний профіль</div>
                <div class="input-group">
                    <label>Магічне Ім'я</label>
                    <input type="text" id="editNameInput" class="auth-input" placeholder="Твоє ім'я...">

                <div class="avatar-selector">
                    <span class="avatar-option selected" data-emoji="🦄">🦄</span>
                    <span class="avatar-option" data-emoji="🐱">🐱</span>

                <div id="chatHeaderAvatar" class="chat-header-avatar">🦄</div>

            </div>

            <div id="pinnedMessageBar" class="pinned-message-bar">
                <div id="pinnedText" class="pinned-text">📌 Закріплено: ...</div>
                <button id="unpinBtn" class="unpin-btn">✕</button>
            </div>

            <div id="messagesContainer" class="messages-container"></div>

            <div class="bottom-controls-wrapper">
                <div id="replyPreviewBar" class="reply-preview-bar hidden">
                    <div id="replyPreviewText" class="reply-preview-text">Відповідь на: ...</div>

                    <span class="sticker-btn" data-sticker="🦄">🦄</span>
                    <span class="sticker-btn" data-sticker="✨">✨</span>
                    <span class="sticker-btn" data-sticker="💖">💖</span>
                    <span class="sticker-btn" data-sticker="🐱">🐱</span>
                    <span class="sticker-btn" data-sticker="🍰">🍰</span>
                    <span class="sticker-btn" data-sticker="🌸">🌸</span>
                    <span class="sticker-btn" data-sticker="🍭">🍭</span>
                    <span class="sticker-btn" data-sticker="🦊">🦊</span>
                </div>

                <div class="chat-input-area">
                    <input type="text" id="messageInput" class="message-input" placeholder="Напиши щось магічне...">
                    <button id="sendMessageBtn" class="send-button">➔</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, addDoc, updateDoc, query, orderBy, onSnapshot, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtqNAADT2KXQG2k3T1X3YRCK7peOxFhTE",
            authDomain: "unicorn-42391.firebaseapp.com",
            projectId: "unicorn-42391",
            storageBucket: "unicorn-42391.firebasestorage.app",
            messagingSenderId: "489547314308",
            appId: "1:489547314308:web:7b9eb3e3852a8ce143fed1",
            measurementId: "G-QJW03PD2PT"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const messaging = getMessaging(app);

        const myVapidKey = "BNqDuIF8xfynQZUA2uTA01_Q4kyEFe6rcmTfOdf2FaTsnRAovjXUSgZrsObEkCCqQ9cCPIQsR160KOc3d-bIqN0";

        const loadingScreen = document.getElementById('loadingScreen'), authScreen = document.getElementById('authScreen'), mainScreen = document.getElementById('mainScreen'), chatWindowScreen = document.getElementById('chatWindowScreen'), profileModal = document.getElementById('profileModal');
        const signUpBtn = document.getElementById('signUpBtn'), signInBtn = document.getElementById('signInBtn'), emailInput = document.getElementById('emailInput'), passwordInput = document.getElementById('passwordInput');
        const myAvatarDisplay = document.getElementById('myAvatarDisplay'), myNameDisplay = document.getElementById('myNameDisplay'), userEmailDisplay = document.getElementById('userEmailDisplay');
        const editProfileBtn = document.getElementById('editProfileBtn'), editNameInput = document.getElementById('editNameInput'), saveProfileBtn = document.getElementById('saveProfileBtn');
        const searchInput = document.getElementById('searchInput'), chatsList = document.getElementById('chatsList');
        const chatWithTitle = document.getElementById('chatWithTitle'), chatHeaderAvatar = document.getElementById('chatHeaderAvatar'), chatHeaderStatus = document.getElementById('chatHeaderStatus'), backToMainBtn = document.getElementById('backToMainBtn'), chatHeaderContainer = document.getElementById('chatHeaderContainer');
        const messageInput = document.getElementById('messageInput'), sendMessageBtn = document.getElementById('sendMessageBtn'), messagesContainer = document.getElementById('messagesContainer');
        const replyPreviewBar = document.getElementById('replyPreviewBar'), replyPreviewText = document.getElementById('replyPreviewText'), cancelReplyBtn = document.getElementById('cancelReplyBtn');
        const pinnedMessageBar = document.getElementById('pinnedMessageBar'), pinnedText = document.getElementById('pinnedText'), unpinBtn = document.getElementById('unpinBtn');

        let currentUserEmail = "", selectedEmoji = "🦄", activeFriendEmail = "", unsubscribeFromChat = null, unsubscribeFromPinned = null, unsubscribeFromStatus = null;
        let replyToMessageText = null, activeChatId = "";
        let editingMessageId = null, typingTimeout = null, myCurrentName = "Новий Маг";

        // РЕЄСТРАЦІЯ SERVICE WORKER ДЛЯ ФОНОВИХ ПУШІВ
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/firebase-messaging-sw.js')
            .then((registration) => {
                console.log('Чарівний Сервіс-Воркер успішно активований:', registration.scope);
            }).catch((err) => {
                console.log('Помилка активації Сервіс-Воркера:', err);
            });
        }

        onAuthStateChanged(auth, async (user) => {
            loadingScreen.classList.add('hidden');
            if (user) {
                currentUserEmail = user.email.toLowerCase();
                userEmailDisplay.innerText = currentUserEmail;
                
                const myKey = currentUserEmail.replace(/[@.]/g, '_');
                const userDoc = await getDoc(doc(db, "users", myKey));
                if (userDoc.exists()) {
                    myCurrentName = userDoc.data().name || "Маг";
                    myNameDisplay.innerText = myCurrentName;
                    myAvatarDisplay.innerText = userDoc.data().avatar;
                    selectedEmoji = userDoc.data().avatar;
                } else {
                    await setDoc(doc(db, "users", myKey), { name: "Новий Маг", avatar: "🦄", isOnline: true, lastActive: Date.now(), isTypingIn: "" });
                }
                
                setUserOnlineStatus(true);
                startActivityTimer();
                requestPushPermission();

                authScreen.classList.add('hidden'); mainScreen.classList.remove('hidden');
                listenToFriendsList();
            } else {
                authScreen.classList.remove('hidden'); mainScreen.classList.add('hidden');
            }
        });

        function requestPushPermission() {
            // Перевіряємо, чи взагалі підтримуються сповіщення
            if (!('Notification' in window)) {
                alert("Помилка: Цей браузер або режим взагалі не підтримує сповіщення!");
                return;
            }

            alert("Діагностика: Запускаю запит дозволу...");
            
            Notification.requestPermission().then((permission) => {
                alert("Діагностика: Статус дозволу від браузера = " + permission);
                
                if (permission === 'granted') {
                    alert("Діагностика: Дозвіл є! Намагаюся отримати токен від Firebase...");
                    
                    getToken(messaging, { vapidKey: myVapidKey }).then((currentToken) => {
                        if (currentToken) {
                            const myKey = currentUserEmail.replace(/[@.]/g, '_');
                            setDoc(doc(db, "users", myKey), { pushToken: currentToken }, { merge: true });
                            alert("УРА! Токен успішно отримано і записано в базу!");
                        } else {
                            alert("Помилка: Firebase не повернув токен. Перевір правильність VAPID ключа!");
                        }
                    }).catch((err) => { 
                        alert('Критична помилка Firebase: ' + err.message); 
                        console.log(err);
                    });
                } else {
                    alert("Попередження: Дозвіл НЕ надано. Пуші заблоковані в налаштуваннях телефону!");
                }
            }).catch((err) => {
                alert("Помилка запиту дозволу: " + err.message);
            });
        }

        // ПРИЙОМ СПОВІЩЕНЬ, КОЛИ ДОДАТОК ВІДКРИТИЙ (ЩОБ НЕ БЛОКУВАЛИСЬ)
        onMessage(messaging, (payload) => {
            console.log('Отримано пуш у відкритому додатку: ', payload);
            if (activeChatId === "") {
                // Показуємо банер, якщо користувач сидить на головному екрані списку чатів
                new Notification(payload.notification.title, {
                    body: payload.notification.body,
                    icon: "data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27><text y=%270.9em%27 font-size=%2790%27>🦄</text></svg>"
                });
            }
        });

        async function setUserOnlineStatus(isOnline) {
            if (!currentUserEmail) return;
            const myKey = currentUserEmail.replace(/[@.]/g, '_');
            try { await setDoc(doc(db, "users", myKey), { isOnline: isOnline, lastActive: Date.now() }, { merge: true }); } catch (e) {}
        }

        function startActivityTimer() {
            setInterval(() => { if (document.visibilityState === 'visible') setUserOnlineStatus(true); }, 30000);
        }

        document.addEventListener('visibilitychange', () => { setUserOnlineStatus(document.visibilityState === 'visible'); });

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', updateHeaderPosition);
            window.visualViewport.addEventListener('scroll', updateHeaderPosition);
        }
        function updateHeaderPosition() {
            if (!chatWindowScreen.classList.contains('hidden') && window.visualViewport) {
                const offsetTop = window.visualViewport.offsetTop;
                chatHeaderContainer.style.top = offsetTop + 'px';
                pinnedMessageBar.style.top = (offsetTop + 64) + 'px';
            }
        }

        messageInput.addEventListener('input', () => {
            if (!activeChatId) return;
            setMyTypingStatus(activeChatId);
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => { setMyTypingStatus(""); }, 2000);
        });

        async function setMyTypingStatus(chatId) {
            if (!currentUserEmail) return;
            const myKey = currentUserEmail.replace(/[@.]/g, '_');
            await setDoc(doc(db, "users", myKey), { isTypingIn: chatId }, { merge: true });
        }

        signUpBtn.addEventListener('click', () => {
            const email = emailInput.value.trim().toLowerCase(), password = passwordInput.value;
            if(!email || !password) return alert("Заповни всі поля!");
            createUserWithEmailAndPassword(auth, email, password).catch(err => alert(err.message));
        });

        signInBtn.addEventListener('click', () => {
            const email = emailInput.value.trim().toLowerCase(), password = passwordInput.value;
            if(!email || !password) return alert("Заповни всі поля!");
            signInWithEmailAndPassword(auth, email, password).catch(err => alert(err.message));
        });

        editProfileBtn.addEventListener('click', () => { profileModal.classList.remove('hidden'); });
        
        document.querySelectorAll('.avatar-option').forEach(opt => {
            opt.addEventListener('click', (e) => {
                document.querySelectorAll('.avatar-option').forEach(o => o.classList.remove('selected'));
                e.target.classList.add('selected');
                selectedEmoji = e.target.getAttribute('data-emoji');
            });
        });

        saveProfileBtn.addEventListener('click', async () => {
            const name = editNameInput.value.trim() || "Анонім";
            myCurrentName = name;
            await setDoc(doc(db, "users", currentUserEmail.replace(/[@.]/g, '_')), { name: name, avatar: selectedEmoji }, { merge: true });
            myNameDisplay.innerText = name; myAvatarDisplay.innerText = selectedEmoji;
            profileModal.classList.add('hidden');
        });

        searchInput.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const friendEmail = searchInput.value.trim().toLowerCase();
                if (!friendEmail || friendEmail === currentUserEmail) return;
                
                const myKey = currentUserEmail.replace(/[@.]/g, '_');
                const friendKey = friendEmail.replace(/[@.]/g, '_');

                await setDoc(doc(db, "users", myKey, "my_friends", friendKey), { email: friendEmail });
                await setDoc(doc(db, "users", friendKey, "my_friends", myKey), { email: currentUserEmail });
                searchInput.value = "";
            }
        });

        function getChatId(email1, email2) { return [email1, email2].sort().join("_").replace(/[@.]/g, '_'); }

        function listenToFriendsList() {
            onSnapshot(collection(db, "users", currentUserEmail.replace(/[@.]/g, '_'), "my_friends"), (snapshot) => {
                if (snapshot.empty) { chatsList.innerHTML = "<div style='text-align:center; padding:20px; color:#7D61AA;'>Введи email подруги в пошуку 🦄</div>"; return; }
                chatsList.innerHTML = "";
                
                snapshot.forEach((friendDoc) => {
                    const fEmail = friendDoc.data().email, fKey = fEmail.replace(/[@.]/g, '_');
                    const chatId = getChatId(currentUserEmail, fEmail);

                    const html = `
                        <div class="chat-item" id="chat-${fKey}">
                            <div class="chat-avatar-container">
                                <div class="chat-avatar" id="avatar-${fKey}">🦄</div>
                                <div class="online-dot" id="dot-${fKey}"></div>
                            </div>
                            <div class="chat-content">
                                <div class="chat-title" id="name-${fKey}">${fEmail}</div>
                                <div class="chat-friend-status" id="status-text-${fKey}">офлайн</div>
                                <p class="chat-message" id="last-msg-${fKey}">Натисни, щоб увійти в чат...</p>
                            </div>
                            <div class="badge hidden" id="badge-${fKey}">0</div>
                        </div>`;
                    chatsList.insertAdjacentHTML('beforeend', html);

                    onSnapshot(doc(db, "users", fKey), (docSnap) => {
                        if(docSnap.exists()) {
                            const data = docSnap.data();
                            document.getElementById(`name-${fKey}`).innerText = data.name || fEmail;
                            document.getElementById(`avatar-${fKey}`).innerText = data.avatar || "🦄";
                            
                            const dot = document.getElementById(`dot-${fKey}`);
                            const statusText = document.getElementById(`status-text-${fKey}`);
                            const isRecentlyActive = data.lastActive && (Date.now() - data.lastActive < 60000);

                            if (data.isTypingIn === chatId) {
                                statusText.innerText = "пише..."; statusText.style.color = "#FF6B6B";
                            } else if (data.isOnline && isRecentlyActive) {
                                dot.classList.add('active'); statusText.innerText = "в мережі 🟢"; statusText.style.color = "#4CAF50";
                            } else {
                                dot.classList.remove('active'); statusText.innerText = "не в мережі ⚪"; statusText.style.color = "#9A80B3";
                            }
                        }
                    });

                    onSnapshot(collection(db, "chats", chatId, "messages"), (msgSnapshot) => {
                        let unreadCount = 0, lastMsgText = "Натисни, щоб увійти в чат...";
                        msgSnapshot.forEach(mDoc => {
                            const data = mDoc.data(); lastMsgText = data.text;
                            if (data.sender === fEmail && data.isRead !== true) unreadCount++;
                        });
                        document.getElementById(`last-msg-${fKey}`).innerText = lastMsgText;
                        const badge = document.getElementById(`badge-${fKey}`);
                        if (unreadCount > 0 && activeChatId !== chatId) {
                            badge.innerText = unreadCount; badge.classList.remove('hidden');
                        } else { badge.classList.add('hidden'); }
                    });

                    document.getElementById(`chat-${fKey}`).addEventListener('click', () => {
                        openChatWindow(fEmail, document.getElementById(`name-${fKey}`).innerText, document.getElementById(`avatar-${fKey}`).innerText);
                    });
                });
            });
        }

        async function markMessagesAsRead() {
            if (!activeChatId || !activeFriendEmail) return;
            try {
                const q = query(collection(db, "chats", activeChatId, "messages"), where("sender", "==", activeFriendEmail));
                const querySnapshot = await getDocs(q);
                querySnapshot.forEach(async (mDoc) => {
                    if (mDoc.data().isRead !== true) { await updateDoc(doc(db, "chats", activeChatId, "messages", mDoc.id), { isRead: true }); }
                });
            } catch (error) { console.error(error); }
        }

        function openChatWindow(friendEmail, name, avatar) {
            activeFriendEmail = friendEmail;
            activeChatId = getChatId(currentUserEmail, activeFriendEmail);
            
            chatWithTitle.innerText = name;
            chatHeaderAvatar.innerText = avatar;
            mainScreen.classList.add('hidden'); chatWindowScreen.classList.remove('hidden');
            
            setTimeout(updateHeaderPosition, 100);

            if (unsubscribeFromChat) unsubscribeFromChat();
            if (unsubscribeFromPinned) unsubscribeFromPinned();
            if (unsubscribeFromStatus) unsubscribeFromStatus();

            markMessagesAsRead();
            listenToPinnedMessage();

            const fKey = activeFriendEmail.replace(/[@.]/g, '_');
            unsubscribeFromStatus = onSnapshot(doc(db, "users", fKey), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const isRecentlyActive = data.lastActive && (Date.now() - data.lastActive < 60000);
                    if (data.isTypingIn === activeChatId) {
                        chatHeaderStatus.innerText = "пише..."; chatHeaderStatus.style.color = "#FF6B6B";
                    } else if (data.isOnline && isRecentlyActive) {
                        chatHeaderStatus.innerText = "в мережі 🟢"; chatHeaderStatus.style.color = "#4CAF50";
                    } else {
                        chatHeaderStatus.innerText = "не в мережі ⚪"; chatHeaderStatus.style.color = "#9A80B3";
                    }
                }
            });

            const q = query(collection(db, "chats", activeChatId, "messages"), orderBy("timestamp", "asc"));
            unsubscribeFromChat = onSnapshot(q, (snapshot) => {
                messagesContainer.innerHTML = "";
                snapshot.forEach((mDoc) => {
                    const data = mDoc.data(), mId = mDoc.id, isMe = data.sender === currentUserEmail;
                    const timeString = data.timestamp ? new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "";
                    const isSticker = data.type === "sticker";
                    const isEdited = data.isEdited ? " <span style='font-style:italic; font-size:10px; color:#9A80B3;'>(ред.)</span>" : "";
                    const quoteHtml = data.replyTo ? `<div class="quote-in-message">↩ Відповідь на: ${data.replyTo}</div>` : "";

                    let reactionsHtml = "";
                    if (data.reactions && Object.keys(data.reactions).length > 0) {
                        reactionsHtml = `<div class="reactions-container">`;
                        for (const [emoji, usersArray] of Object.entries(data.reactions)) {
                            if (usersArray && usersArray.length > 0) reactionsHtml += `<span>${emoji} ${usersArray.length}</span>`;
                        }
                        reactionsHtml += `</div>`;
                    }

                    let ticksHtml = "";
                    if (isMe) { ticksHtml = data.isRead ? `<span class="status-ticks read">✔✔</span>` : `<span class="status-ticks">✔</span>`; }

                    const actionGroupHtml = `
                        <div class="msg-hover-actions" id="actions-${mId}">
                            <button class="msg-action-btn" data-id="${mId}" data-action="reply" title="Відповісти">↩</button>
                            ${isMe && !isSticker ? `<button class="msg-action-btn" data-id="${mId}" data-action="edit" title="Редагувати">✏️</button>` : ''}
                            <button class="msg-action-btn" data-id="${mId}" data-action="pin" title="Закріпити">📌</button>
                            <button class="msg-action-btn toggle-reactions-btn" data-id="${mId}" title="Реакції">🥰</button>
                            <div class="inline-reaction-picker hidden" id="picker-${mId}">
                                <span class="inline-emoji" data-id="${mId}" data-emoji="❤️">❤️</span>
                                <span class="inline-emoji" data-id="${mId}" data-emoji="✨">✨</span>
                                <span class="inline-emoji" data-id="${mId}" data-emoji="😂">😂</span>
                                <span class="inline-emoji" data-id="${mId}" data-emoji="😭">😭</span>
                                <span class="inline-emoji" data-id="${mId}" data-emoji="👍">👍</span>
                            </div>
                        </div>
                    `;

                    const msgHtml = `
                        <div class="msg-line-block ${isMe ? 'sent' : 'received'}" id="wrapper-${mId}">
                            <div class="msg-bubble-box" data-id="${mId}">
                                ${actionGroupHtml}
                                <div class="message ${isSticker ? 'sticker' : (isMe ? 'sent' : 'received')}">
                                    ${quoteHtml}
                                    <span>${data.text}</span>${isEdited}
                                    ${reactionsHtml}
                                </div>
                                <div class="message-meta">
                                    <span>${timeString}</span> ${ticksHtml}
                                </div>
                            </div>
                        </div>`;
                    messagesContainer.appendChild(new DOMParser().parseFromString(msgHtml, 'text/html').body.firstChild);
                });
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            });

            messagesContainer.onclick = async (e) => {
                const btn = e.target.closest('.msg-action-btn:not(.toggle-reactions-btn)');
                if (btn) {
                    const mId = btn.dataset.id, action = btn.dataset.action;
                    if (action === 'reply') setupReply(mId);
                    if (action === 'edit') setupEdit(mId);
                    if (action === 'pin') pinMessage(mId);
                    return;
                }

                const toggleBtn = e.target.closest('.toggle-reactions-btn');
                if (toggleBtn) {
                    const mId = toggleBtn.dataset.id;
                    const picker = document.getElementById(`picker-${mId}`), bar = document.getElementById(`actions-${mId}`);
                    if (picker.classList.contains('hidden')) {
                        document.querySelectorAll('.inline-reaction-picker').forEach(p => p.classList.add('hidden'));
                        document.querySelectorAll('.msg-hover-actions').forEach(b => b.classList.remove('active'));
                        picker.classList.remove('hidden'); bar.classList.add('active'); 
                    } else { picker.classList.add('hidden'); bar.classList.remove('active'); }
                    return;
                }

                const emojiSpan = e.target.closest('.inline-emoji');
                if (emojiSpan) {
                    const mId = emojiSpan.dataset.id, emoji = emojiSpan.dataset.emoji;
                    await toggleReaction(mId, emoji); return;
                }
                
                const bubble = e.target.closest('.message');
                if(bubble) {
                    const parentBox = bubble.closest('.msg-bubble-box'), mId = parentBox.dataset.id;
                    const bar = document.getElementById(`actions-${mId}`), isAlreadyActive = bar.classList.contains('active');
                    document.querySelectorAll('.msg-hover-actions').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.inline-reaction-picker').forEach(p => p.classList.add('hidden'));
                    if(!isAlreadyActive) bar.classList.add('active');
                }
            };
        }

        async function toggleReaction(messageId, emoji) {
            const msgRef = doc(db, "chats", activeChatId, "messages", messageId);
            const msgSnap = await getDoc(msgRef); if (!msgSnap.exists()) return;
            const data = msgSnap.data(); let reactions = data.reactions || {}, usersWhoReacted = reactions[emoji] || [];
            if (usersWhoReacted.includes(currentUserEmail)) { usersWhoReacted = usersWhoReacted.filter(email => email !== currentUserEmail); }
            else { usersWhoReacted.push(currentUserEmail); }
            if (usersWhoReacted.length === 0) delete reactions[emoji]; else reactions[emoji] = usersWhoReacted;
            await updateDoc(msgRef, { reactions: reactions });
        }

        function listenToPinnedMessage() {
            unsubscribeFromPinned = onSnapshot(doc(db, "chats", activeChatId), (docSnap) => {
                if (docSnap.exists() && docSnap.data().pinnedMessage) {
                    const pinnedData = docSnap.data().pinnedMessage;
                    pinnedText.innerText = `📌 Закріплено: ${pinnedData.text}`;
                    pinnedText.dataset.targetId = pinnedData.id;
                    pinnedMessageBar.classList.remove('hidden'); messagesContainer.style.paddingTop = "120px";
                } else { pinnedMessageBar.classList.add('hidden'); messagesContainer.style.paddingTop = "75px"; }
                updateHeaderPosition();
            });
        }

        async function pinMessage(mId) {
            const msgDoc = await getDoc(doc(doc(db, "chats", activeChatId, "messages", mId)));
            if (msgDoc.exists()) { await setDoc(doc(db, "chats", activeChatId), { pinnedMessage: { id: mId, text: msgDoc.data().text } }, { merge: true }); }
        }

        unpinBtn.onclick = async () => { await setDoc(doc(db, "chats", activeChatId), { pinnedMessage: null }, { merge: true }); };
        pinnedText.onclick = () => {
            const tId = pinnedText.dataset.targetId, targetEl = document.getElementById(`wrapper-${tId}`);
            if (targetEl) targetEl.scrollIntoView({ behavior: 'smooth' });
        };

        async function setupReply(mId) {
            const msgDoc = await getDoc(doc(db, "chats", activeChatId, "messages", mId));
            if (msgDoc.exists()) {
                replyToMessageText = msgDoc.data().text; replyPreviewText.innerText = `Відповідь на: ${replyToMessageText}`;
                replyPreviewBar.classList.remove('hidden'); editingMessageId = null; sendMessageBtn.innerText = "➔"; messageInput.focus();
            }
        }

        async function setupEdit(mId) {
            const msgDoc = await getDoc(doc(db, "chats", activeChatId, "messages", mId));
            if (msgDoc.exists()) {
                editingMessageId = mId; messageInput.value = msgDoc.data().text;
                replyPreviewText.innerText = `Редагування: ${msgDoc.data().text}`; replyPreviewBar.classList.remove('hidden');
                sendMessageBtn.innerText = "✓"; replyToMessageText = null; messageInput.focus();
            }
        }

        function cancelEditMode() { editingMessageId = null; sendMessageBtn.innerText = "➔"; replyPreviewBar.classList.add('hidden'); messageInput.value = ""; }
        cancelReplyBtn.onclick = () => { replyToMessageText = null; cancelEditMode(); };

        // АВТОМАТИЗОВАНА СИСТЕМА ПУШІВ ЧЕРЕЗ FIRESTORE
        async function sendPushNotificationToFriend(friendEmail, messageText) {
            const friendKey = friendEmail.replace(/[@.]/g, '_');
            const friendDoc = await getDoc(doc(db, "users", friendKey));
            
            if (friendDoc.exists() && friendDoc.data().pushToken) {
                const token = friendDoc.data().pushToken;
                
                await addDoc(collection(db, "magic_notifications"), {
                    toToken: token,
                    title: `${myCurrentName} надіслала повідомлення! 🦄`,
                    body: messageText,
                    createdAt: Date.now()
                });
            }
        }

        async function handleSendMessage(text, type = "text") {
            if (!text.trim()) return;
            setMyTypingStatus("");

            if (editingMessageId) {
                await updateDoc(doc(db, "chats", activeChatId, "messages", editingMessageId), { text: text.trim(), isEdited: true });
                cancelEditMode();
            } else {
                const msgData = { text: text.trim(), sender: currentUserEmail, timestamp: Date.now(), type: type, isRead: false };
                if (replyToMessageText) msgData.replyTo = replyToMessageText;
                await addDoc(collection(db, "chats", activeChatId, "messages"), msgData);
                
                sendPushNotificationToFriend(activeFriendEmail, type === "sticker" ? "Надіслала тобі стікер " + text : text);
                
                replyToMessageText = null; replyPreviewBar.classList.add('hidden'); messageInput.value = "";
            }
            setTimeout(() => { messageInput.focus(); messagesContainer.scrollTop = messagesContainer.scrollHeight; }, 50);
        }

        sendMessageBtn.onclick = () => handleSendMessage(messageInput.value);
        messageInput.onkeypress = (e) => { if (e.key === 'Enter') handleSendMessage(messageInput.value); };

        document.querySelectorAll('.sticker-btn').forEach(btn => {
            btn.onclick = () => { const sticker = btn.dataset.sticker; handleSendMessage(sticker, "sticker"); };
        });

        backToMainBtn.onclick = () => {
            setMyTypingStatus(""); 
            mainScreen.classList.remove('hidden');
            chatWindowScreen.classList.add('hidden');
            activeChatId = ""; activeFriendEmail = "";
            if (unsubscribeFromChat) unsubscribeFromChat();
            if (unsubscribeFromPinned) unsubscribeFromPinned();
            if (unsubscribeFromStatus) unsubscribeFromStatus();
        };
    </script>
</body>
</html>
