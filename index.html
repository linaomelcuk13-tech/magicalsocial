    <style>

        .msg-line-block.received .reactions-container { left: 10px; }

        .message-meta { font-size: 10px; color: #9A80B3; margin-top: 4px; width: 100%; display: flex; box-sizing: border-box; }
        .msg-line-block.sent .message-meta { justify-content: flex-end; padding-right: 4px; }
        .msg-line-block.received .message-meta { justify-content: flex-start; padding-left: 4px; }
        .status-ticks { font-weight: bold; color: #9A80B3; font-size: 11px; margin-left: 4px; }

        /* ЗОНА ВВЕДЕННЯ ТА ПАНЕЛІ ЗНИЗУ */

        .sticker-btn { cursor: pointer; transition: transform 0.1s; display: inline-block; }
        .sticker-btn:hover { transform: scale(1.2); }

        .chat-input-area { padding: 10px; display: flex; gap: 10px; align-items: center; background-color: #FFFFFF; }
        .message-input { flex: 1; padding: 12px; border: 2px solid #D8BFFF; border-radius: 20px; font-family: inherit; font-size: 14px; outline: none; background-color: #FBF7FF; -webkit-appearance: none; }
        .send-button { width: 45px; height: 45px; border-radius: 50%; background-color: #FFDAF0; border: 2px solid #D8BFFF; color: #5D418A; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0px 2px 0px #D8BFFF; flex-shrink: 0; }

    </style>

        // Чарівний аудіо-синтезатор для сповіщень
        function playMagicChime() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(587.33, ctx.currentTime); // D5
                osc.frequency.setValueAtTime(880.00, ctx.currentTime + 0.1); // A5
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.4);
            } catch (e) { console.log("Аудіо заблоковано браузером"); }
        }

                userEmailDisplay.innerText = currentUserEmail;
                
                const myKey = currentUserEmail.replace(/[@.]/g, '_');
                const userDoc = await getDoc(doc(db, "users", myKey));
                if (userDoc.exists()) {
                    myCurrentName = userDoc.data().name || "Маг";
                    myNameDisplay.innerText = myCurrentName;
                    myAvatarDisplay.innerText = userDoc.data().avatar;
                    selectedEmoji = userDoc.data().avatar;
                } else {
                    await setDoc(doc(db, "users", myKey), { name: "Новий Маг", avatar: "🦄", isOnline: true, lastActive: Date.now(), isTypingIn: "" });
                }
                
                setUserOnlineStatus(true);
                startActivityTimer();
                requestPushPermission();

                authScreen.classList.add('hidden'); mainScreen.classList.remove('hidden');
                listenToFriendsList();
            } else {
                authScreen.classList.remove('hidden'); mainScreen.classList.add('hidden');
            }
        });

        async function requestPushPermission() {
            if (!('Notification' in window)) return;
            Notification.requestPermission().then((permission) => {
                if (permission === 'granted') {
                    navigator.serviceWorker.ready.then((registration) => {
                        getToken(messaging, { vapidKey: myVapidKey, serviceWorkerRegistration: registration })
                        .then((currentToken) => {
                            if (currentToken) {
                                const myKey = currentUserEmail.replace(/[@.]/g, '_');
                                setDoc(doc(db, "users", myKey), { pushToken: currentToken }, { merge: true });
                            }
                        }).catch((err) => { console.error('Firebase token error:', err); });
                    });
                }
            }).catch((err) => { console.error('Permission request error:', err); });
        }

        async function setUserOnlineStatus(isOnline) {
            if (!currentUserEmail) return;
            const myKey = currentUserEmail.replace(/[@.]/g, '_');
            try { await setDoc(doc(db, "users", myKey), { isOnline: isOnline, lastActive: Date.now() }, { merge: true }); } catch (e) {}
        }

        function startActivityTimer() {
            setInterval(() => { if (document.visibilityState === 'visible') setUserOnlineStatus(true); }, 30000);
        }

        document.addEventListener('visibilitychange', () => { setUserOnlineStatus(document.visibilityState === 'visible'); });

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', updateHeaderPosition);
            window.visualViewport.addEventListener('scroll', updateHeaderPosition);
        }
        function updateHeaderPosition() {
            if (!chatWindowScreen.classList.contains('hidden') && window.visualViewport) {
                const offsetTop = window.visualViewport.offsetTop;
                chatHeaderContainer.style.top = offsetTop + 'px';
                pinnedMessageBar.style.top = (offsetTop + 64) + 'px';
            }
        }

        messageInput.addEventListener('input', () => {
            if (!activeChatId) return;
            setMyTypingStatus(activeChatId);
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => { setMyTypingStatus(""); }, 2000);
        });

        async function setMyTypingStatus(chatId) {
            if (!currentUserEmail) return;
            const myKey = currentUserEmail.replace(/[@.]/g, '_');
            await setDoc(doc(db, "users", myKey), { isTypingIn: chatId }, { merge: true });
        }

        signUpBtn.addEventListener('click', () => {
            const email = emailInput.value.trim().toLowerCase(), password = passwordInput.value;
            if(!email || !password) return alert("Заповни всі поля!");
            createUserWithEmailAndPassword(auth, email, password).catch(err => alert(err.message));
        });

        signInBtn.addEventListener('click', () => {
            const email = emailInput.value.trim().toLowerCase(), password = passwordInput.value;
            if(!email || !password) return alert("Заповни всі поля!");
            signInWithEmailAndPassword(auth, email, password).catch(err => alert(err.message));
        });

        editProfileBtn.addEventListener('click', () => { profileModal.classList.remove('hidden'); });
        
        document.querySelectorAll('.avatar-option').forEach(opt => {
            opt.addEventListener('click', (e) => {
                document.querySelectorAll('.avatar-option').forEach(o => o.classList.remove('selected'));
                e.target.classList.add('selected');
                selectedEmoji = e.target.getAttribute('data-emoji');
            });
        });

        saveProfileBtn.addEventListener('click', async () => {
            const name = editNameInput.value.trim() || "Анонім";
            myCurrentName = name;
            await setDoc(doc(db, "users", currentUserEmail.replace(/[@.]/g, '_')), { name: name, avatar: selectedEmoji }, { merge: true });
            myNameDisplay.innerText = name; myAvatarDisplay.innerText = selectedEmoji;
            profileModal.classList.add('hidden');
        });

        searchInput.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const friendEmail = searchInput.value.trim().toLowerCase();
                if (!friendEmail || friendEmail === currentUserEmail) return;
                
                const myKey = currentUserEmail.replace(/[@.]/g, '_');
                const friendKey = friendEmail.replace(/[@.]/g, '_');

                await setDoc(doc(db, "users", myKey, "my_friends", friendKey), { email: friendEmail });
                await setDoc(doc(db, "users", friendKey, "my_friends", myKey), { email: currentUserEmail });
                searchInput.value = "";
            }
        });

        function getChatId(email1, email2) { return [email1, email2].sort().join("_").replace(/[@.]/g, '_'); }

        function listenToFriendsList() {
            onSnapshot(collection(db, "users", currentUserEmail.replace(/[@.]/g, '_'), "my_friends"), (snapshot) => {
                if (snapshot.empty) { chatsList.innerHTML = "<div style='text-align:center; padding:20px; color:#7D61AA;'>Введи email подруги в пошуку 🦄</div>"; return; }
                chatsList.innerHTML = "";
                
                snapshot.forEach((friendDoc) => {
                    const fEmail = friendDoc.data().email, fKey = fEmail.replace(/[@.]/g, '_');
                    
                    const item = document.createElement('div');
                    item.className = 'chat-item';
                    item.innerHTML = `
                        <div class="chat-avatar-container">
                            <div class="chat-avatar" id="avatar_${fKey}">🦄</div>
                            <div class="online-dot" id="dot_${fKey}"></div>
                        </div>
                        <div class="chat-content">
                            <div class="chat-title" id="name_${fKey}">${fEmail}</div>
                            <div class="chat-friend-status" id="typing_${fKey}"></div>
                            <div class="chat-message" id="msg_${fKey}">Немає повідомлень</div>
                        </div>
                        <div class="badge hidden" id="badge_${fKey}">0</div>
                    `;
                    
                    item.addEventListener('click', () => openChatWindow(fEmail));
                    chatsList.appendChild(item);

                    onSnapshot(doc(db, "users", fKey), (uDoc) => {
                        if(uDoc.exists()) {
                            const uData = uDoc.data();
                            document.getElementById(`name_${fKey}`).innerText = uData.name || fEmail;
                            document.getElementById(`avatar_${fKey}`).innerText = uData.avatar || "🦄";
                            
                            const dot = document.getElementById(`dot_${fKey}`);
                            if(uData.isOnline) dot.classList.add('active'); else dot.classList.remove('active');

                            const typingDiv = document.getElementById(`typing_${fKey}`);
                            const cId = getChatId(currentUserEmail, fEmail);
                            if (uData.isTypingIn === cId) {
                                typingDiv.innerText = "Друкує магію... ✨";
                                typingDiv.style.color = "#4CAF50";
                            } else {
                                typingDiv.innerText = uData.isOnline ? "В мережі" : "Офлайн";
                                typingDiv.style.color = "#9A80B3";
                            }
                        }
                    });

                    const chatId = getChatId(currentUserEmail, fEmail);
                    const lastMsgQuery = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "desc"), where("timestamp", "!=", null));
                    
                    let isFirstLoad = true;
                    onSnapshot(lastMsgQuery, (mSnapshot) => {
                        if(!mSnapshot.empty) {
                            const lastDoc = mSnapshot.docs[0].data();
                            let previewText = lastDoc.text || "Стікер 🦄";
                            if(lastDoc.sender === currentUserEmail) previewText = "Ти: " + previewText;
                            document.getElementById(`msg_${fKey}`).innerText = previewText;

                            // Внутрішнє фонове сповіщення для інших чатів
                            if (!isFirstLoad && lastDoc.sender !== currentUserEmail && activeChatId !== chatId) {
                                playMagicChime();
                                const badge = document.getElementById(`badge_${fKey}`);
                                if(badge) {
                                    let count = parseInt(badge.innerText) || 0;
                                    badge.innerText = count + 1;
                                    badge.classList.remove('hidden');
                                }
                            }
                        }
                        isFirstLoad = false;
                    });
                });
            });
        }

        async function openChatWindow(friendEmail) {
            activeFriendEmail = friendEmail;
            activeChatId = getChatId(currentUserEmail, friendEmail);
            
            const fKey = friendEmail.replace(/[@.]/g, '_');
            const badge = document.getElementById(`badge_${fKey}`);
            if(badge) { badge.innerText = "0"; badge.classList.add('hidden'); }

            mainScreen.classList.add('hidden');
            chatWindowScreen.classList.remove('hidden');
            messagesContainer.innerHTML = "";

            if(unsubscribeFromChat) unsubscribeFromChat();
            if(unsubscribeFromPinned) unsubscribeFromPinned();
            if(unsubscribeFromStatus) unsubscribeFromStatus();

            unsubscribeFromStatus = onSnapshot(doc(db, "users", fKey), (uDoc) => {
                if(uDoc.exists()) {
                    const uData = uDoc.data();
                    chatWithTitle.innerText = uData.name || friendEmail;
                    chatHeaderAvatar.innerText = uData.avatar || "🦄";
                    
                    if (uData.isTypingIn === activeChatId) {
                        chatHeaderStatus.innerText = "друкує магію... ✨";
                        chatHeaderStatus.style.color = "#4CAF50";
                    } else {
                        chatHeaderStatus.innerText = uData.isOnline ? "в мережі" : "поза мережею";
                        chatHeaderStatus.style.color = "#A080D0";
                    }
                }
            });

            const q = query(collection(db, "chats", activeChatId, "messages"), orderBy("timestamp", "asc"));
            
            unsubscribeFromChat = onSnapshot(q, (snapshot) => {
                messagesContainer.innerHTML = "";
                snapshot.forEach((mDoc) => {
                    const mId = mDoc.id;
                    const data = mDoc.data();
                    const isMe = data.sender === currentUserEmail;

                    const lineBlock = document.createElement('div');
                    lineBlock.className = `msg-line-block ${isMe ? 'sent' : 'received'}`;

                    let quoteHtml = "";
                    if (data.replyTo) {
                        quoteHtml = `<div class="quote-in-message">${data.replyTo}</div>`;
                    }

                    let msgContent = `<div class="message ${isMe ? 'sent' : 'received'}">${quoteHtml}${data.text}</div>`;
                    if (data.type === "sticker") {
                        msgContent = `<div class="message sticker">${data.text}</div>`;
                    }

                    let reactionsHtml = "";
                    if (data.reactions && Object.keys(data.reactions).length > 0) {
                        let rText = Object.entries(data.reactions).map(([emoji, count]) => `${emoji} ${count}`).join(" ");
                        reactionsHtml = `<div class="reactions-container">${rText}</div>`;
                    }

                    let timeStr = "";
                    if (data.timestamp) {
                        const date = new Date(data.timestamp);
                        timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    }

                    let ticks = "";
                    if (isMe) {
                        ticks = `<span class="status-ticks ${data.isRead ? 'read' : ''}">${data.isRead ? '✓✓' : '✓'}</span>`;
                    }

                    lineBlock.innerHTML = `
                        <div class="msg-bubble-box" id="bubble_${mId}">
                            <div class="msg-hover-actions">
                                <button class="msg-action-btn" onclick="replyMessage('${mId}', '${(data.text || "Стікер").replace(/'/g, "\\'")}')">↩️</button>
                                <button class="msg-action-btn" onclick="pinMessage('${mId}', '${(data.text || "Стікер").replace(/'/g, "\\'")}')">📌</button>
                                ${isMe ? `<button class="msg-action-btn" onclick="editMessage('${mId}', '${(data.text || "").replace(/'/g, "\\'")}')">✏️</button>` : ''}
                                ${isMe ? `<button class="msg-action-btn" onclick="deleteMessage('${mId}')">🗑️</button>` : ''}
                                <div class="inline-reaction-picker">
                                    <span class="inline-emoji" onclick="addReaction('${mId}', '💖')">💖</span>
                                    <span class="inline-emoji" onclick="addReaction('${mId}', '👍')">👍</span>
                                    <span class="inline-emoji" onclick="addReaction('${mId}', '😂')">😂</span>
                                </div>
                            </div>
                            ${msgContent}
                            ${reactionsHtml}
                            <div class="message-meta">${timeStr} ${ticks}</div>
                        </div>
                    `;

                    messagesContainer.appendChild(lineBlock);

                    if (!isMe && !data.isRead) {
                        updateDoc(doc(db, "chats", activeChatId, "messages", mId), { isRead: true });
                    }
                });
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            });

            unsubscribeFromPinned = onSnapshot(doc(db, "chats", activeChatId), (cDoc) => {
                if (cDoc.exists() && cDoc.data().pinnedText) {
                    pinnedText.innerText = `📌 Закріплено: ${cDoc.data().pinnedText}`;
                    pinnedMessageBar.classList.remove('hidden');
                } else {
                    pinnedMessageBar.classList.add('hidden');
                }
            });
        }

        async function handleSendMessage(text, type = "text") {
            const cleanText = text.trim();
            if (!cleanText || !activeChatId) return;

            messageInput.value = "";
            setMyTypingStatus("");

            if (editingMessageId) {
                await updateDoc(doc(db, "chats", activeChatId, "messages", editingMessageId), {
                    text: cleanText,
                    isEdited: true
                });
                editingMessageId = null;
                sendMessageBtn.innerText = "➔";
                return;
            }

            const msgData = {
                text: cleanText,
                sender: currentUserEmail,
                senderName: myCurrentName,
                timestamp: Date.now(),
                type: type,
                isRead: false
            };

            if (replyToMessageText) {
                msgData.replyTo = replyToMessageText;
                replyToMessageText = null;
                replyPreviewBar.classList.add('hidden');
            }

            await addDoc(collection(db, "chats", activeChatId, "messages"), msgData);
        }

        sendMessageBtn.onclick = () => handleSendMessage(messageInput.value);
        messageInput.onkeypress = (e) => { if (e.key === 'Enter') handleSendMessage(messageInput.value); };

        window.replyMessage = function(mId, text) {
            replyToMessageText = text;
            replyPreviewText.innerText = `Відповідь на: ${text}`;
            replyPreviewBar.classList.remove('hidden');
            messageInput.focus();
        };

        cancelReplyBtn.onclick = () => { replyToMessageText = null; replyPreviewBar.classList.add('hidden'); };

        window.pinMessage = async function(mId, text) {
            await setDoc(doc(db, "chats", activeChatId), { pinnedText: text, pinnedId: mId }, { merge: true });
        };

        unpinBtn.onclick = async () => {
            await setDoc(doc(db, "chats", activeChatId), { pinnedText: null, pinnedId: null }, { merge: true });
        };

        window.editMessage = function(mId, currentText) {
            editingMessageId = mId;
            messageInput.value = currentText;
            sendMessageBtn.innerText = "💾";
            messageInput.focus();
        };

        window.deleteMessage = async function(mId) {
            if(confirm("Видалити це повідомлення?")) {
                await updateDoc(doc(db, "chats", activeChatId, "messages", mId), {
                    text: "🗑️ Повідомлення видалено",
                    type: "text",
                    sticker: null
                });
            }
        };

        window.addReaction = async function(mId, emoji) {
            const mRef = doc(db, "chats", activeChatId, "messages", mId);
            const mDoc = await getDoc(mRef);
            if (!mDoc.exists()) return;
            
            let reactions = mDoc.data().reactions || {};
            reactions[emoji] = (reactions[emoji] || 0) + 1;
            await updateDoc(mRef, { reactions: reactions });
        };

        document.querySelectorAll('.sticker-btn').forEach(btn => {
            btn.onclick = (e) => {
                const sticker = e.target.getAttribute('data-sticker');
                handleSendMessage(sticker, "sticker");
            };
        });

        backToMainBtn.onclick = () => {
            activeChatId = "";
            activeFriendEmail = "";
            chatWindowScreen.classList.add('hidden');
            mainScreen.classList.remove('hidden');
            if(unsubscribeFromChat) unsubscribeFromChat();
            if(unsubscribeFromStatus) unsubscribeFromStatus();
        };
    </script>
</body>
</html>
